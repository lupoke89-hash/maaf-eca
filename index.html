<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Eca Tersayang 🥺</title>
    <style>
        :root {
            --pink-neon: #ff2a74;
            --purple-neon: #9d4edd;
            --bg-dark: #0b0c10;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animasi Hati Terbang di Background */
        .hati-bg {
            position: absolute;
            color: rgba(255, 42, 116, 0.25);
            font-size: 20px;
            animation: terbang 4s linear infinite;
            z-index: 1;
        }

        @keyframes terbang {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Animasi Lucu Pulsing untuk Emoji */
        .animasi-lucu {
            font-size: 4.5rem;
            animation: denyut 1.2s infinite alternate;
            margin-bottom: 15px;
        }

        @keyframes denyut {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .kontainer-utama {
            background: linear-gradient(145deg, #1f1b24, #0b0c10);
            border: 2px solid rgba(255, 42, 116, 0.4);
            border-radius: 30px;
            padding: 30px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 42, 116, 0.2);
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 1.5rem;
            color: #ffffff;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .tombol-aksi {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-maaf {
            background-color: var(--pink-neon);
            color: white;
            box-shadow: 0 0 15px var(--pink-neon);
        }

        .btn-nynda {
            background-color: #333;
            color: #aaa;
            position: relative;
            z-index: 999;
        }

        /* Bagian Pertanyaan Menuju Geser */
        #section-tanya, #section-quiz, #section-loading, #section-final {
            display: none;
        }

        .btn-geser {
            background: linear-gradient(45deg, var(--pink-neon), var(--purple-neon));
            color: white;
            width: 100%;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 0 10px var(--purple-neon);
            animation: geserAnim 1s infinite alternate;
        }

        @keyframes geserAnim {
            0% { transform: translateX(0); }
            100% { transform: translateX(8px); }
        }

        /* Desain Kalkulator ala TikTok */
        .kalkulator {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 15px;
        }

        .screen-kalkulator {
            background: #111;
            padding: 15px;
            font-size: 1.5rem;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 15px;
            color: #00e676;
            font-family: monospace;
            min-height: 35px;
        }

        .grid-kalkulator {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-kalkulator button {
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            background: #222;
            color: white;
        }

        .grid-kalkulator button.btn-sama-dengan {
            background: var(--pink-neon);
            grid-column: span 2;
        }

        /* Tampilan Hitungan Persen */
        .persen-love-teks {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--pink-neon);
            text-shadow: 0 0 15px var(--pink-neon);
            margin: 15px 0;
            line-height: 1.5;
        }

        .list-love-box {
            max-height: 180px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 15px;
            text-align: left;
            font-size: 0.85rem;
        }

        /* Tampilan Akhir Teks Besar */
        .teks-besar-final {
            font-size: 2.2rem;
            font-weight: 900;
            color: #00e676;
            text-shadow: 0 0 25px #00e676;
            line-height: 1.3;
            animation: gemetar 0.3s infinite;
        }

        @keyframes gemetar {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -1px) rotate(1deg); }
        }
    </style>
</head>
<body>

<div class="kontainer-utama" id="box-konten">
    <div id="section-init">
        <div class="animasi-lucu">🥺❤️</div>
        <h1>eca faro minta maaf neh so ta, lalu egois, eca se maaf p, faro?</h1>
        <div class="tombol-aksi">
            <button class="btn-maaf" onclick="pindahBabak('init', 'tanya')">maaf</button>
            <button class="btn-nynda" id="btn-no" onmouseover="hindariTombol()" onclick="hindariTombol()">nynda</button>
        </div>
    </div>

    <div id="section-tanya">
        <div class="animasi-lucu">🥰</div>
        <h1>aku ingin bertanya di sini...</h1>
        <button class="btn-geser" onclick="pindahBabak('tanya', 'quiz')">Geser ke Kanan ➔</button>
    </div>

    <div id="section-quiz">
        <h1 style="margin-bottom: 5px;">1 + 1 = berapa banyak? 🤔</h1>
        <div class="kalkulator">
            <div class="screen-kalkulator" id="screen-calc"></div>
            <div class="grid-kalkulator">
                <button onclick="tekanAngka('1')">1</button>
                <button onclick="tekanAngka('2')">2</button>
                <button onclick="tekanAngka('+')">+</button>
                <button onclick="hapusCalc()" style="background:#cc1d1d;">C</button>
                <button class="btn-sama-dengan" onclick="prosesJawaban()">=</button>
            </div>
        </div>
    </div>

    <div id="section-loading">
        <div class="animasi-lucu" style="font-size:3.5rem;">💖🔄</div>
        <div class="list-love-box" id="log-love"></div>
    </div>

    <div id="section-final">
        <div class="animasi-lucu">🦖 Mengaummm! ✨</div>
        <div class="teks-besar-final">TERIMA KASIH ECA TERSAYANGKU ❤️❤️❤️</div>
    </div>
</div>

<script>
    // Membuat Partikel Hati otomatis di layar luar
    setInterval(() => {
        const hati = document.createElement('div');
        hati.classList.add('hati-bg');
        hati.innerHTML = '❤️';
        hati.style.left = Math.random() * 100 + 'vw';
        hati.style.animationDuration = (Math.random() * 2 + 2) + 's';
        document.body.appendChild(hati);
        setTimeout(() => hati.remove(), 4000);
    }, 250);

    // Fungsi Lari Tombol "nynda" (Mau ditekan/didekati tetep menghindar)
    function hindariTombol() {
        const btn = document.getElementById('btn-no');
        const x = Math.random() * (window.innerWidth - btn.offsetWidth - 40);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight - 40);
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }

    // Navigasi perpindahan antar babak section
    function pindahBabak(dari, ke) {
        document.getElementById(`section-${dari}`).style.display = 'none';
        document.getElementById(`section-${ke}`).style.display = 'block';
    }

    // Logic Operasional Kalkulator Mini
    const screen = document.getElementById('screen-calc');
    function tekanAngka(val) {
        screen.innerText += val;
    }
    function hapusCalc() {
        screen.innerText = '';
    }

    // Pengecekan Jawaban pas pencet tombol sama dengan (=)
    function prosesJawaban() {
        const txt = screen.innerText.trim();
        // Sesuai request: ketik 1+1, 1+2, atau langsung angka 2
        if(txt === '2' || txt === '1+1' || txt === '1+2') {
            pindahBabak('quiz', 'loading');
            mulaiLoadingPersen();
        } else {
            alert('Jawaban salah ecaaa, coba ketik 2 atau 1+1 ! 😜');
            hapusCalc();
        }
    }

    // Jalannya perhitungan persen cinta dari 10% sampai 100%
    function mulaiLoadingPersen() {
        let progress = 10;
        const logLove = document.getElementById('log-love');
        
        const interval = setInterval(() => {
            if (progress > 100) {
                clearInterval(interval);
                // Selesai loading, langsung lempar ke Babak Akhir teks besar
                setTimeout(() => {
                    pindahBabak('loading', 'final');
                }, 600);
            } else {
                // Cetak baris tulisan cinta bertingkat
                const item = document.createElement('div');
                item.className = 'persen-love-teks';
                item.innerHTML = `AI LOVE U ECA ❤️❤️❤️❤️❤️ ${progress}%`;
                logLove.appendChild(item);
                logLove.scrollTop = logLove.scrollHeight;
                
                progress += 10; // Kelipatan 10% sesuai request lu bray
            }
        }, 350); // Kecepatan render baris persen
    }
</script>

</body>
</html>
